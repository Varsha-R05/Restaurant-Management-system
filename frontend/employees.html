<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Management - Employees</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">Restaurant Admin</div>
        <nav>
            <ul>
                <li><a href="index.html">Food Items</a></li>
                <li><a href="customers.html">Customers</a></li>
                <li><a href="employees.html" class="active">Employees</a></li>
                <li><a href="payment.html">Payment</a></li>
                <li><a href="inventory.html">Inventory</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <section id="employees" class="module">
            <h2>Employee Management</h2>
            <div class="controls">
                <button id="add-employee-btn">Add New Employee</button>
            </div>
            <div id="add-employee-form" style="display: none;">
                <form id="new-employee-form">
                    <label for="employee-name">Name:</label>
                    <input type="text" id="employee-name" required><br>

                    <label for="employee-role">Role:</label>
                    <select id="employee-role" name="employee-role" required>
                        <option value="waiter">Waiter</option>
                        <option value="chef">Chef</option>
                        <option value="manager">Manager</option>
                        <option value="other">Other</option>
                    </select><br><br>
                    
                    <label for="employee-phone">Phone Number:</label>
                    <input type="text" id="employee-phone" maxlength="10" required><br>

                    <label for="employee-email">Email:</label>
                    <input type="email" id="employee-email" required><br>

                    <label for="employee-salary">Salary:</label>
                    <input type="number" id="employee-salary" required><br>

                    <label for="employee-username">Username:</label>
                    <input type="text" id="employee-username" required><br>

                    <label for="employee-password">Password:</label>
                    <input type="password" id="employee-password" required><br>

                    <label for="employee-rating">Average Rating:</label>
                    <input type="number" step="0.1" id="employee-rating"><br>

                    <button type="submit">Add Employee</button>
                    <button type="button" id="cancel-add-employee">Cancel</button>
                </form>
            </div>
            
            <table id="employee-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Role</th>
                        <th>Phone Number</th>
                        <th>Email</th>
                        <th>Salary</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>            
        </section>
    </main>

    <footer>
        &copy; 2025 Restaurant Management System
    </footer>

    <script src="script.js"></script>
</body>
</html>
