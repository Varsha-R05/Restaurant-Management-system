<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Management - Inventory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">Restaurant Admin</div>
        <nav>
            <ul>
                <li><a href="index.html">Food Items</a></li>
                <li><a href="customers.html">Customers</a></li>
                <li><a href="employees.html">Employees</a></li>
                <li><a href="payment.html">Payment</a></li>
                <li><a href="inventory.html" class="active">Inventory</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="inventory" class="module">
            <h2>Inventory Management</h2>
            <div class="controls">
                <button id="add-inventory-btn">Add New Inventory Item</button>
            </div>
            <div id="add-inventory-form" style="display: none;">
                <h3>Add New Inventory Item</h3>
                <form id="new-inventory-form">
                    <label for="inventory-name">Item Name:</label>
                    <input type="text" id="inventory-name" name="inventory-name" required><br><br>
                    <label for="inventory-quantity">Quantity in Stock:</label>
                    <input type="number" id="inventory-quantity" name="inventory-quantity" min="0" required><br><br>
                    <label for="inventory-unit">Unit:</label>
                    <input type="text" id="inventory-unit" name="inventory-unit" required><br><br>
                    <button type="submit">Save Inventory Item</button>
                    <button type="button" id="cancel-add-inventory">Cancel</button>
                </form>
            </div>
            <div class="inventory-list">
                <h3>Current Inventory Items</h3>
                <table id="inventory-table">
                    <thead>
                        <tr>
                            <th>Item Name</th>
                            <th>Quantity in Stock</th>
                            <th>Unit</th>
                            <th>Last Updated</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
    <footer>
        &copy; 2025 Restaurant Management System
    </footer>
    <script src="script.js"></script>
</body>
</html>
